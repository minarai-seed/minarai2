<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIカフェ店員 - 完全無料・安心音声会話</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f5efe6; color: #4f46e5; margin: 0; }
        .container { background: #ffffff; padding: 40px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 90%; max-width: 400px; border: 2px solid #e1d7c6; }
        h2 { color: #8b5a2b; margin-bottom: 5px; }
        p { color: #6e655f; font-size: 14px; margin-bottom: 25px; }
        button { background: #8b5a2b; color: white; border: none; padding: 16px 32px; font-size: 18px; border-radius: 30px; cursor: pointer; transition: 0.3s; font-weight: bold; width: 100%; box-shadow: 0 4px 12px rgba(139,90,43,0.3); }
        button:hover { background: #6f4722; }
        button:disabled { background: #cccccc; cursor: not-allowed; box-shadow: none; }
        #status { margin-top: 25px; font-size: 15px; color: #8b5a2b; font-weight: 500; }
        #log { margin-top: 20px; text-align: left; background: #faf8f5; padding: 12px; border-radius: 12px; max-height: 150px; overflow-y: auto; font-size: 13px; color: #555; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="container">
    <h2>☕️ カフェAI店員 (無料版)</h2>
    <p>ボタンを押して注文を話しかけてください</p>
    <button id="talk-btn">話しかける</button>
    <div id="status">ボタンを押すと注文が始まります</div>
    <div id="log"><strong>注文履歴:</strong><br></div>
</div>

<script>
    // ーーー 設定（GitHub Actionsが本物のキーに置き換えます） ーーー
    const GEMINI_API_KEY = "__GEMINI_API_KEY_PLACEHOLDER__"; 
    const GEMINI_URL = `https://googleapis.com{GEMINI_API_KEY}`;

    const SYSTEM_INSTRUCTION = `
    あなたはオシャレなカフェの若い女性店員です。
    【性格・特徴】
    - 明るく、丁寧で、親しみやすい接客をしてください。
    - 返答は1〜2文程度で、極めて「簡潔」にテンポよく話してください（長文は厳禁）。
    - ユーザーから「コーヒー」「お茶」「カフェオレ」のいずれかの注文を聞き出してください。
    - 注文を受け付けたら、「かしこまりました！コーヒー（注文されたもの）ですね、少々お待ちください！」のように明るくハキハキと答えて会話を締めくくってください。
    `;

    let conversationHistory = [];

    const talkBtn = document.getElementById('talk-btn');
    const statusDiv = document.getElementById('status');
    const logDiv = document.getElementById('log');
    let hasOrdered = false;

    // 🔥 【Chromeフリーズ対策】発話オブジェクトが消去されないように、関数の外側で永続的に保持する
    let currentUtterance = null;

    // 音声認識の初期化
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'ja-JP';
    recognition.interimResults = false; 
    recognition.maxAlternatives = 1;

    talkBtn.addEventListener('click', () => {
        window.speechSynthesis.cancel(); // 喋っている途中なら止める
        startListening();
    });

    function startListening() {
        try {
            recognition.start();
            statusDiv.innerText = "ご注文をどうぞ！聞き取り中...";
            talkBtn.disabled = true;
        } catch (e) {
            console.error("開始エラー:", e);
        }
    }

    recognition.onresult = async (event) => {
        let userText = "";
        try {
            userText = event.results[0][0].transcript;
        } catch (e) {
            console.error("テキスト抽出に失敗:", e);
        }

        if (!userText || userText.trim() === "") {
            statusDiv.innerText = "うまく聞き取れませんでした。";
            talkBtn.disabled = false;
            return;
        }

        addLog(`あなた: ${userText}`);
        statusDiv.innerText = "店員が考えています...";

        conversationHistory.push({ role: "user", parts: [{ text: userText }] });

        const aiResponse = await fetchAIResponse();
        addLog(`店員: ${aiResponse}`);

        checkAndDownloadOrder(aiResponse);
        speak(aiResponse);
    };

    recognition.onend = () => {
        // AIが考え中、または発話中でなければ、聞き取り失敗時にボタンを戻す
        if (statusDiv.innerText === "ご注文をどうぞ！聞き取り中...") {
            resetTalkButton();
        }
    };

    async function fetchAIResponse() {
        try {
            const response = await fetch(GEMINI_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: conversationHistory,
                    systemInstruction: {
                        parts: [{ text: SYSTEM_INSTRUCTION }]
                    }
                })
            });
            const data = await response.json();
            
            if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
                const aiText = data.candidates[0].content.parts[0].text;
                conversationHistory.push({ role: "model", parts: [{ text: aiText }] });
                return aiText;
            } else {
                return "すみません、もう一度おっしゃっていただけますか？";
            }
        } catch (error) {
            console.error("API通信エラー:", error);
            return "すみません、通信エラーが起きてしまいました。もう一度お試しください。";
        }
    }

    function checkAndDownloadOrder(text) {
        if (hasOrdered) return;

        let orderItem = "";
        if (text.includes("コーヒー")) { orderItem = "コーヒー"; }
        else if (text.includes("お茶")) { orderItem = "お茶"; }
        else if (text.includes("カフェオレ")) { orderItem = "カフェオレ"; }

        if (orderItem) {
            hasOrdered = true;
            addLog(`📄 検知: ${orderItem}`);
            
            const blob = new Blob([orderItem], { type: "text/plain;charset=utf-8" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "order.txt";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            addLog(`✅ order.txt を自動保存しました`);
        }
    }

    // 🔥 【大修正】Chromeのオンエンドバグを完全に回避する音声合成関数
    function speak(text) {
        statusDiv.innerText = "店員が話しています...";
        
        // 関数ローカルではなく、グローバル変数（外側の枠）に代入してメモリ解放を防ぐ
        currentUtterance = new SpeechSynthesisUtterance(text);
        currentUtterance.lang = 'ja-JP';
        
        const voices = window.speechSynthesis.getVoices();
        let selectedVoice = voices.find(v => v.lang.includes('ja') && v.name.includes('Google'));
        if (!selectedVoice) selectedVoice = voices.find(v => v.lang.includes('ja') && v.name.includes('Haruka'));
        if (!selectedVoice) selectedVoice = voices.find(v => v.lang.includes('ja'));

        if (selectedVoice) currentUtterance.voice = selectedVoice;

        currentUtterance.pitch = 1.1;  // 声の高さ
        currentUtterance.rate = 1.05;  // 話す速度

        // 終了イベントを確実に発火させる
        currentUtterance.onend = () => {
            currentUtterance = null; // 使い終わったらメモリを開放
            resetTalkButton();
        };

        // 万が一エラーが起きても確実に固まるのを防ぐセーフティ
        currentUtterance.onerror = (e) => {
            console.error("発話エラー:", e);
            currentUtterance = null;
            resetTalkButton();
        };
        
        window.speechSynthesis.speak(currentUtterance);
    }

    // ボタンの状態を元に戻す共通処理
    function resetTalkButton() {
        if (hasOrdered) {
            statusDiv.innerText = "ありがとうございました！またお待ちしております。";
            talkBtn.disabled = true;
        } else {
            statusDiv.innerText = "次の注文をどうぞ（ボタンを押してください）";
            talkBtn.disabled = false;
        }
    }

    function addLog(msg) {
        logDiv.innerHTML += msg + "<br>";
        logDiv.scrollTop = logDiv.scrollHeight;
    }

    window.speechSynthesis.onvoiceschanged = () => {};
</script>


</body>
</html>
