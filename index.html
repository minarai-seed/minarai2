<!DOCTYPE html>
<html lang="ja">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>AIカフェ店員 (GitHub Pagesテスト版)</title>
 <style>
 body { font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; 
flex-direction: column; align-items: center; justify-content: center; height: 100vh; 
background: #f5efe6; color: #4f46e5; margin: 0; }
 .container { background: #ffffff; padding: 40px; border-radius: 24px; 
box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; width: 90%; max-width: 
400px; border: 2px solid #e1d7c6; }
 h2 { color: #8b5a2b; margin-bottom: 5px; }
 p { color: #6e655f; font-size: 14px; margin-bottom: 25px; }
 button { background: #8b5a2b; color: white; border: none; padding: 16px 32px; 
font-size: 18px; border-radius: 30px; cursor: pointer; transition: 0.3s; font-weight: 
bold; width: 100%; box-shadow: 0 4px 12px rgba(139,90,43,0.3); }
 button:hover { background: #6f4722; }
 button:disabled { background: #cccccc; cursor: not-allowed; box-shadow: none; }
 #status { margin-top: 25px; font-size: 15px; color: #8b5a2b; font-weight: 500; min-height: 24px; }
 #log { margin-top: 20px; text-align: left; background: #faf8f5; padding: 12px; 
border-radius: 12px; max-height: 150px; overflow-y: auto; font-size: 13px; color: #555;
border: 1px solid #eee; }
 /* キー入力欄のスタイル */
 .key-container { margin-bottom: 20px; text-align: left; }
 .key-container input { width: 93%; padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 14px; }
 .key-container label { font-size: 12px; color: #8b5a2b; font-weight: bold; display: block; margin-bottom: 5px; }
 </style>
</head>
<body>
<div class="container">
 <h2>MInaRAI カフェAI店員</h2>
 <p>GitHub Pages テスト環境</p>

 <!-- APIキーを隠すための画面入力欄 -->
 <div class="key-container">
   <label for="api-key">Gemini API Key を入力してください：</label>
   <input type="password" id="api-key" placeholder="AI Studioで取得した AIzaSy... で始まるキー">
 </div>

 <button id="talk-btn">会話を始める</button>
 <div id="status">APIキーを入力し、ボタンを押すと注文が始まります</div>
 <div id="log"><strong>注文履歴:</strong><br></div>
</div>
<script>
 const SYSTEM_INSTRUCTION = `
 あなたはオシャレなカフェの若い女性店員「ミナライ」です。
 【性格・特徴】
 - 明るく、丁寧で、親しみやすい接客をしてください。
 - 返答は1〜2文程度で、極めて「簡潔」にテンポよく話してください（長文は厳禁）。
 - ユーザーから「コーヒー」「お茶」「カフェオレ」のいずれかの注文を聞き出してください。
 - 注文を受け付けたら、「かしこまりました！（注文されたもの）ですね、少々お待ちください！」のように明るくハキハキと答えてください。
 `;

 let conversationHistory = [];
 const talkBtn = document.getElementById('talk-btn');
 const statusDiv = document.getElementById('status');
 const logDiv = document.getElementById('log');
 const apiKeyInput = document.getElementById('api-key');
 
 let isAppRunning = false;    
 let isCoolDown = false;      
 let orderCounter = 1;        

 // 音声認識の初期化
 const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
 const recognition = new SpeechRecognition();
 recognition.lang = 'ja-JP';
 recognition.interimResults = false; 
 recognition.maxAlternatives = 1;

 // ボタンを押したら開始
 talkBtn.addEventListener('click', () => {
   if (!apiKeyInput.value.trim()) {
     alert("APIキーを入力してください。コードにベタ書きして公開するのは危険なため、画面入力方式にしています。");
     return;
   }
   window.speechSynthesis.cancel(); 
   isAppRunning = true;
   talkBtn.disabled = true;
   talkBtn.innerText = "会話中...";
   apiKeyInput.disabled = true; // 開始後は入力欄をロック
   startListening();
 });

 function startListening() {
   if (!isAppRunning || isCoolDown) return;
   try {
     recognition.start();
     statusDiv.innerText = "ご注文をどうぞ！聞き取り中...";
   } catch (e) {
     console.log("音声認識の開始をスキップ:", e);
   }
 }

 recognition.onresult = async (event) => {
   let userText = "";
   try {
     userText = event.results[0][0].transcript; 
   } catch (e) {
     console.error("テキスト抽出に失敗:", e);
   }
   if (!userText || userText.trim() === "") {
     statusDiv.innerText = "うまく聞き取れませんでした。";
     return;
   }
   
   addLog(`あなた: ${userText}`);
   statusDiv.innerText = "店員が考えています...";
   
   conversationHistory.push({ role: "user", parts: [{ text: userText }] });
   const aiResponse = await fetchAIResponse();
   addLog(`店員: ${aiResponse}`);
   
   checkAndDownloadOrder(aiResponse);
   speak(aiResponse);
 };

 recognition.onend = () => {
   if (isAppRunning && !isCoolDown && statusDiv.innerText.includes("聞き取り中")) {
     startListening();
   }
 };

 // 画面から取得したAPIキーを使って直接Gemini APIを叩く（最新モデル: gemini-2.5-flash）
 async function fetchAIResponse() {
   const apiKey = apiKeyInput.value.trim();
   // 最新の gemini-2.5-flash のエンドポイント
//   const url = `https://googleapis.com{apiKey}`;
    const GEMINI_API_KEY = "__GEMINI_API_KEY_PLACEHOLDER__"; 
    const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;

    try {
     const response = await fetch(url, {
       method: "POST",
       headers: { "Content-Type": "application/json" },
       body: JSON.stringify({
         contents: conversationHistory,
         systemInstruction: {
           parts: [{ text: SYSTEM_INSTRUCTION }]
         }
       })
     });
     const data = await response.json();
     
     if (data.candidates && data.candidates[0] && data.candidates[0].content && 
         data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
       const aiText = data.candidates[0].content.parts[0].text;
       conversationHistory.push({ role: "model", parts: [{ text: aiText }] });
       return aiText;
     } else {
       console.error("想定外のレスポンス構造:", data);
       return "すみません、もう一度おっしゃっていただけますか？";
     }
   } catch (error) {
     console.error("API通信エラー:", error);
     return "すみません、通信エラーが起きてしまいました。もう一度お試しください。";
   }
 }

 function checkAndDownloadOrder(text) {
   let orderItem = "";
   if (text.includes("コーヒー")) { orderItem = "コーヒー"; }
   else if (text.includes("お茶")) { orderItem = "お茶"; }
   else if (text.includes("カフェオレ")) { orderItem = "カフェオレ"; }
   
   if (orderItem) {
     addLog(`🎁 検知: ${orderItem}`); 
     
     const blob = new Blob([orderItem], { type: "text/plain;charset=utf-8" });
     const a = document.createElement("a");
     a.href = URL.createObjectURL(blob);
     a.download = `order_${orderCounter}.txt`; 
     document.body.appendChild(a);
     a.click();
     document.body.removeChild(a);
     
     addLog(`📄 order_${orderCounter}.txt を自動保存しました`); 
     orderCounter++; 
   }
 }

 function speak(text) {
   statusDiv.innerText = "店員が話しています...";
   const utterance = new SpeechSynthesisUtterance(text);
   utterance.lang = 'ja-JP';
   
   const voices = window.speechSynthesis.getVoices();
   let selectedVoice = voices.find(v => v.lang.includes('ja') && v.name.includes('Google'));
   if (!selectedVoice) {
     selectedVoice = voices.find(v => v.lang.includes('ja') && v.name.includes('Haruka'));
   }
   if (!selectedVoice) {
     selectedVoice = voices.find(v => v.lang.includes('ja'));
   }
   if (selectedVoice) {
     utterance.voice = selectedVoice;
   }
   
   utterance.pitch = 1.1; 
   utterance.rate = 1.05; 
   
   utterance.onend = () => {
     startCoolDown(); 
   };
   
   window.speechSynthesis.speak(utterance);
 }

 function startCoolDown() {
   isCoolDown = true;
   recognition.stop(); 
   let timeLeft = 5;
   
   const interval = setInterval(() => {
     if (timeLeft > 0) {
       statusDiv.innerText = `⚠️ 混雑防止のため、あと ${timeLeft} 秒お待ちください...`;
       timeLeft--;
     } else {
       clearInterval(interval);
       isCoolDown = false;
       statusDiv.innerText = "次の注文をどうぞ！聞き取り中...";
       startListening(); 
     }
   }, 1000);
 }

 function addLog(msg) {
   logDiv.innerHTML += msg + "<br>";
   logDiv.scrollTop = logDiv.scrollHeight;
 }
</script>
</body>
</html>
